name: Scrape Movie Schedules

on:
  schedule:
    # 毎日6回更新 (JST 9:00, 12:00, 15:00, 18:00, 20:00, 24:00)
    - cron: "0 0,3,6,9,11,15 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "取得する日数"
        required: false
        default: "7"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: scraper
        run: uv sync

      - name: Install Playwright browsers
        working-directory: scraper
        run: uv run playwright install --with-deps chromium

      - name: Run scraper
        working-directory: scraper
        run: uv run python -m src.main ${{ github.event.inputs.days || '7' }}

      - name: Copy data to web/public
        run: |
          mkdir -p web/public/data/schedules
          cp -r data/schedules/* web/public/data/schedules/

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update movie schedules $(date +%Y-%m-%d)"
            git push
          fi
